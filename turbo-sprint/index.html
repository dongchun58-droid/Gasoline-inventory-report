<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏎️</text></svg>" />
  <title>TURBO SPRINT — 10초 그랑프리</title>
  <style>
    html, body { margin: 0; overflow: hidden; touch-action: none; background: #000; }
    canvas { display: block; }

    /* --- Phase 1 minimal HUD (full DOM HUD arrives in Phase 6) --- */
    #hud {
      position: fixed; inset: 0; pointer-events: none;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #fff;
    }
    #speed {
      position: absolute; left: 20px; bottom: 18px;
      font-size: 34px; font-weight: 800; letter-spacing: 1px;
      text-shadow: -2px 0 #1b2a6b, 2px 0 #1b2a6b, 0 -2px #1b2a6b, 0 2px #1b2a6b;
    }
    #speed small { font-size: 15px; font-weight: 600; opacity: .85; margin-left: 4px; }
    #hint {
      position: absolute; left: 20px; top: 16px;
      font-size: 13px; font-weight: 600; line-height: 1.55; opacity: .9;
      text-shadow: -1px 0 #1b2a6b, 1px 0 #1b2a6b, 0 -1px #1b2a6b, 0 1px #1b2a6b;
    }
    #fps {
      position: absolute; right: 16px; top: 14px;
      font-size: 13px; font-weight: 700; opacity: .8;
      text-shadow: -1px 0 #1b2a6b, 1px 0 #1b2a6b, 0 -1px #1b2a6b, 0 1px #1b2a6b;
    }
    #lap {
      position: absolute; left: 20px; bottom: 62px;
      font-size: 20px; font-weight: 800;
      text-shadow: -2px 0 #1b2a6b, 2px 0 #1b2a6b, 0 -2px #1b2a6b, 0 2px #1b2a6b;
    }
    #lap b { font-size: 26px; }
    #rank {
      position: absolute; right: 22px; bottom: 16px;
      font-size: 58px; font-weight: 900; line-height: .9;
      color: #ffd23f;
      text-shadow: -3px 0 #1b2a6b, 3px 0 #1b2a6b, 0 -3px #1b2a6b, 0 3px #1b2a6b, 0 4px 0 #1b2a6b;
    }
    #rank sup { font-size: 26px; }
    #item {
      position: absolute; right: 20px; top: 44px;
      width: 92px; height: 92px; border-radius: 20px;
      background: rgba(20,24,60,.45); border: 4px solid rgba(255,255,255,.85);
      box-shadow: 0 4px 14px rgba(0,0,0,.35);
      display: flex; align-items: center; justify-content: center;
    }
    #itemIcon { font-size: 52px; line-height: 1; }
    #minimap {
      position: absolute; right: 18px; top: 148px;
      width: 160px; height: 160px;
      background: rgba(20,24,60,.4); border: 3px solid rgba(255,255,255,.75);
      border-radius: 16px; box-shadow: 0 4px 12px rgba(0,0,0,.3);
    }
    #result {
      position: fixed; inset: 0; z-index: 8; display: none;
      align-items: center; justify-content: center;
      background: rgba(10,12,30,.55); backdrop-filter: blur(3px);
      font-family: system-ui, sans-serif; color: #fff;
    }
    #result.show { display: flex; }
    .rbox { text-align: center; }
    #rTitle { font-size: 30px; font-weight: 800; letter-spacing: 2px; opacity: .95; }
    #rPlace { font-size: 96px; font-weight: 900; color: #ffd23f;
      text-shadow: 0 4px 0 #1b2a6b, -3px 0 #1b2a6b, 3px 0 #1b2a6b; margin: 4px 0; }
    #rTime { font-size: 34px; font-weight: 800; }
    #rStandings { margin: 16px auto 0; display: inline-block; text-align: left; }
    .rrow { display: flex; gap: 12px; align-items: center; font-size: 20px; font-weight: 700;
      padding: 4px 14px; border-radius: 10px; min-width: 200px; }
    .rrow.you { background: rgba(255,210,63,.22); }
    .rrow span:first-child { width: 30px; text-align: center; }
    #rHint { margin-top: 18px; font-size: 18px; font-weight: 700; opacity: .9; }
    /* 시작 화면 (2단계 위저드: 차량 → 맵) */
    #startScreen {
      position: fixed; inset: 0; z-index: 12; display: none;
      align-items: center; justify-content: center; text-align: center;
      background: radial-gradient(ellipse at center, rgba(30,111,224,.35), rgba(10,12,30,.75));
      backdrop-filter: blur(2px);
      font-family: system-ui, sans-serif; color: #fff;
    }
    #startScreen.show { display: flex; animation: fadein .4s ease; }
    .sbox { width: 100%; max-height: 100vh; overflow-y: auto; box-sizing: border-box;
      padding: 12px; display: flex; flex-direction: column; align-items: center; }
    #sTitle { font-size: 40px; font-weight: 900; letter-spacing: 2px;
      text-shadow: 0 4px 0 #1b2a6b, -2px 0 #1b2a6b, 2px 0 #1b2a6b; margin-bottom: 4px; }
    #sSub, .sSub2 { font-size: 17px; font-weight: 700; opacity: .9; margin: 4px 0 12px; }
    /* 단계 전환 */
    .step { display: none; flex-direction: column; align-items: center; width: 100%; }
    .step.on { display: flex; animation: fadein .25s ease; }
    .vhint { font-size: 13px; opacity: .68; margin-top: 10px; font-weight: 700; }
    /* 차량 카드 (가로 한 줄) */
    #vehicleSelect { display: flex; gap: 8px; justify-content: center; flex-wrap: nowrap;
      max-width: 100%; overflow-x: auto; padding-bottom: 4px; }
    #characterSelect { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
      max-width: 100%; padding-bottom: 4px; margin-bottom: 6px; }
    .ccard {
      pointer-events: auto; cursor: pointer; width: 108px; flex: 0 0 auto; padding: 10px 9px;
      background: rgba(20,24,60,.5); border: 3px solid rgba(255,255,255,.35);
      border-radius: 14px; color: #fff; transition: transform .1s, border-color .1s; text-align: center;
    }
    .ccard.sel { border-color: #ffd23f; background: rgba(255,210,63,.18); transform: translateY(-4px); }
    .ccard .cface { width: 54px; height: 54px; border-radius: 50%; margin: 2px auto 8px;
      border: 3px solid rgba(255,255,255,.5); box-shadow: inset -4px -6px 10px rgba(0,0,0,.35); }
    .ccard .cname { font-size: 13px; font-weight: 900; letter-spacing: .3px; }
    .vcard {
      pointer-events: auto; cursor: pointer; width: 126px; flex: 0 0 auto; padding: 10px 9px;
      background: rgba(20,24,60,.5); border: 3px solid rgba(255,255,255,.35);
      border-radius: 14px; color: #fff; transition: transform .1s, border-color .1s;
    }
    .vcard.sel { border-color: #ffd23f; background: rgba(255,210,63,.18); transform: translateY(-4px); }
    .vcard .vname { font-size: 17px; font-weight: 900; margin-bottom: 7px; }
    .vbar { display: flex; align-items: center; gap: 6px; margin: 5px 0; font-size: 10px; font-weight: 800; }
    .vbar .vlab { width: 34px; text-align: left; opacity: .95; letter-spacing: .3px; }
    .vbar .vtrack { display: block; flex: 1; height: 11px; background: rgba(0,0,0,.45); border-radius: 6px; overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,.5); border: 1px solid rgba(255,255,255,.12); }
    .vbar .vfill { display: block; height: 100%; border-radius: 6px; min-width: 4px; transition: width .2s; }
    .vfill.spd { background: linear-gradient(90deg,#0aa6d6,#4df0ff); box-shadow: 0 0 8px rgba(55,224,255,.8); }
    .vfill.pow { background: linear-gradient(90deg,#d63b3b,#ff8a6b); box-shadow: 0 0 8px rgba(255,107,107,.8); }
    .vfill.trn { background: linear-gradient(90deg,#3ec24a,#9dff6b); box-shadow: 0 0 8px rgba(124,255,107,.8); }
    .selLabel { font-size: 13px; font-weight: 800; letter-spacing: 2px; opacity: .7; margin: 4px 0 8px; }
    #mapSelect { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
    .mcard {
      pointer-events: auto; cursor: pointer; width: 210px; padding: 12px 14px;
      background: rgba(20,24,60,.5); border: 3px solid rgba(255,255,255,.35);
      border-radius: 16px; color: #fff; text-align: left; transition: transform .1s, border-color .1s;
    }
    .mcard.sel { border-color: #ffd23f; background: rgba(255,210,63,.18); transform: translateY(-4px); }
    .mswatch { display: flex; gap: 5px; margin-bottom: 8px; }
    .mswatch .msw { width: 30px; height: 14px; border-radius: 4px; box-shadow: inset 0 0 0 1px rgba(255,255,255,.25); }
    .mcard .mname { font-size: 19px; font-weight: 900; }
    .mcard .mdesc { font-size: 12px; font-weight: 600; opacity: .82; margin-top: 3px; }
    /* 뒤로 버튼 (좌상단) */
    #btnBack {
      position: absolute; left: 14px; top: 14px; z-index: 13; display: none;
      pointer-events: auto; cursor: pointer; -webkit-tap-highlight-color: transparent;
      font-family: system-ui, sans-serif; font-weight: 800; font-size: 16px; color: #fff;
      background: rgba(20,24,60,.6); border: 2px solid rgba(255,255,255,.55);
      border-radius: 999px; padding: 9px 18px;
    }
    #btnBack.on { display: block; }
    #btnBack:active { transform: scale(.94); }
    .startbtn {
      pointer-events: auto; cursor: pointer; -webkit-tap-highlight-color: transparent;
      font-family: system-ui, sans-serif; font-weight: 900; font-size: 28px; color: #1b2a6b;
      background: #ffd23f; border: 5px solid #fff; border-radius: 999px;
      padding: 13px 42px; box-shadow: 0 6px 0 #b98a1f, 0 10px 20px rgba(0,0,0,.35);
      animation: pulse 1.1s ease-in-out infinite;
    }
    .startbtn:active { transform: translateY(3px); box-shadow: 0 3px 0 #b98a1f; }
    #btnAgain { margin-top: 18px; }
    .startbtn.slowin { animation: pulse 1.1s ease-in-out infinite, slowin 1.6s ease both; }
    /* 좁은 화면(폰 가로): 타이틀·카드 축소 */
    @media (max-width: 720px), (max-height: 430px) {
      #sTitle { font-size: 30px; margin-bottom: 2px; }
      #sSub, .sSub2 { font-size: 15px; margin: 2px 0 10px; }
      .vcard { width: 108px; padding: 8px 7px; }
      .vcard .vname { font-size: 15px; margin-bottom: 5px; }
      .vbar { font-size: 9px; gap: 5px; margin: 4px 0; }
      .vbar .vlab { width: 28px; }
      .vbar .vtrack { height: 10px; }
      .startbtn { font-size: 23px; padding: 11px 34px; }
      .mcard { width: 180px; padding: 10px 12px; }
    }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slowin { 0% { opacity: 0; transform: scale(.7); } 60% { opacity: 0; } 100% { opacity: 1; transform: scale(1); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    #btnMute {
      position: absolute; right: 16px; top: 40px; pointer-events: auto; cursor: pointer;
      background: rgba(20,24,60,.4); border: 2px solid rgba(255,255,255,.6); color: #fff;
      border-radius: 12px; width: 44px; height: 40px; font-size: 20px;
    }
    /* 카운트다운 3·2·1·GO */
    #countdown {
      position: fixed; inset: 0; z-index: 9; display: none;
      align-items: center; justify-content: center; pointer-events: none;
      font-family: system-ui, sans-serif; font-weight: 900; font-size: 22vh;
      color: #fff; text-shadow: 0 6px 0 #1b2a6b, -4px 0 #1b2a6b, 4px 0 #1b2a6b, 0 -4px #1b2a6b;
    }
    #countdown.go { color: #7CFF6B; font-size: 26vh; }
    /* 남은 바퀴 팝업 */
    #lapPopup {
      position: fixed; top: 20%; left: 50%; transform: translateX(-50%);
      z-index: 7; opacity: 0; pointer-events: none;
      font-family: system-ui, sans-serif; font-weight: 900; font-size: 44px;
      color: #ffd23f; text-shadow: 0 4px 0 #1b2a6b, -3px 0 #1b2a6b, 3px 0 #1b2a6b;
    }
    #lapPopup.show { opacity: 1; }
    /* 터치 조작 */
    #touch { position: fixed; inset: 0; z-index: 6; display: none; }
    #touch.show { display: block; }
    /* 왼쪽 조이스틱 */
    #joyZone { position: absolute; left: 0; top: 0; width: 52%; height: 100%;
      pointer-events: auto; touch-action: none; }
    #joyBase, #joyKnob {
      position: fixed; opacity: 0; pointer-events: none; border-radius: 50%;
      transform: translate(-50%, -50%); transition: opacity .12s;
    }
    #joyBase { width: 148px; height: 148px; border: 4px solid rgba(255,255,255,.55);
      background: rgba(20,24,60,.28); box-shadow: 0 4px 16px rgba(0,0,0,.3); }
    #joyKnob { width: 70px; height: 70px; border: 3px solid rgba(255,255,255,.9);
      background: rgba(46,107,255,.62); }
    /* 오른쪽 버튼 */
    #touch .tpad { position: absolute; right: 24px; bottom: 26px; display: flex; align-items: flex-end; gap: 16px; }
    .tbtn {
      pointer-events: auto; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent;
      border: 3px solid rgba(255,255,255,.82); background: rgba(20,24,60,.42); color: #fff;
      font-family: system-ui, sans-serif; font-weight: 800; border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px; touch-action: none; line-height: 1;
    }
    .tbtn.active { background: rgba(255,210,63,.6); transform: scale(.94); }
    .tbtn.big { width: 104px; height: 104px; font-size: 34px; background: rgba(46,107,255,.5); }
    .tbtn.big span { font-size: 13px; font-weight: 800; }
    .tbtn.small { width: 76px; height: 76px; font-size: 15px; }
    #btnRestart.restart { position: absolute; top: 14px; right: 200px; width: 52px; height: 52px; font-size: 24px; border-radius: 50%; }
    /* Portrait warning */
    #rotate {
      position: fixed; inset: 0; display: none; z-index: 10;
      background: #14102b; color: #fff;
      align-items: center; justify-content: center; text-align: center;
      font-family: system-ui, sans-serif; font-size: 20px; font-weight: 700;
    }
    @media (orientation: portrait) and (max-width: 900px) {
      #rotate { display: flex; }
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="hint">
      ↑/W 가속 · ↓/S 브레이크 · ←→/AD 조향<br />
      Shift 드리프트 · Space 아이템 · R 리스타트
    </div>
    <div id="lap">LAP <b>1</b>/3</div>
    <div id="item"><span id="itemIcon"></span></div>
    <canvas id="minimap" width="160" height="160"></canvas>
    <div id="rank"><b>1</b><sup>st</sup></div>
    <div id="speed">0<small>km/h</small></div>
    <div id="fps">-- fps</div>
    <button id="btnMute" title="음소거">🔊</button>
  </div>
  <div id="startScreen" class="show">
    <button id="btnBack">‹ 뒤로</button>
    <div class="sbox">
      <div id="sTitle">TURBO SPRINT</div>
      <!-- 1단계: 캐릭터 선택 -->
      <div id="step1" class="step on">
        <div id="sSub">① 캐릭터를 선택하세요</div>
        <div id="characterSelect"></div>
        <div class="vhint">캐릭터를 탭하면 차량 선택으로 넘어갑니다 →</div>
      </div>
      <!-- 2단계: 차량 선택 -->
      <div id="step2" class="step">
        <div class="sSub2">② 차량을 선택하세요</div>
        <div id="vehicleSelect"></div>
        <div class="vhint">차량을 탭하면 맵 선택으로 넘어갑니다 →</div>
      </div>
      <!-- 3단계: 맵 선택 + 시작 -->
      <div id="step3" class="step">
        <div class="sSub2">③ 맵을 선택하세요</div>
        <div id="mapSelect"></div>
        <button id="btnStart" class="startbtn">START ▶</button>
      </div>
    </div>
  </div>
  <div id="countdown"></div>
  <div id="lapPopup"></div>
  <div id="result">
    <div class="rbox">
      <div id="rTitle">🏁 GOAL IN! 🏁</div>
      <div id="rPlace">1st</div>
      <div id="rTime">00.00</div>
      <div id="rStandings"></div>
      <button id="btnAgain" class="startbtn slowin">START ▶</button>
      <div id="rHint">R 키로도 재시작</div>
    </div>
  </div>
  <!-- 터치 조작 (키보드 없는 기기) -->
  <div id="touch">
    <div id="joyZone"></div>
    <div id="joyBase"></div>
    <div id="joyKnob"></div>
    <div class="tpad tright">
      <button id="btnDrift" class="tbtn small">DRIFT</button>
      <button id="btnItem" class="tbtn big">🎁<span>ITEM</span></button>
    </div>
    <button id="btnRestart" class="tbtn restart">↺</button>
  </div>
  <div id="rotate">📱 → 🖥️<br />가로로 돌려주세요</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
